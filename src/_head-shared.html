<!-- _head.html — include snippet (copy into each page's <head>) -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700;900&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          curry: { 50:'#FFFBEB', 100:'#FEF3C7', 300:'#F59E0B', 400:'#D97706', 500:'#B45309', 600:'#92400E', 800:'#6B2D00', 900:'#451A03' },
          saffron:  '#F4A100',
          turmeric: '#E8870A',
          chili:    '#B91C1C',
          cream:    '#FDF8F0',
        },
        fontFamily: {
          serif: ['"Noto Serif Thai"', 'serif'],
          sans:  ['Sarabun', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  * { font-family: 'Sarabun', sans-serif; }
  h1,h2,h3,.heading { font-family: 'Noto Serif Thai', serif; }
  .nav-link.active { color: #F4A100; border-bottom: 2px solid #F4A100; }
  .dish-card { transition: transform .28s ease, box-shadow .28s ease; cursor: pointer; }
  .dish-card:hover { transform: translateY(-5px); box-shadow: 0 16px 36px rgba(69,26,3,.15); }
  .spice-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#F4A100; margin:0 3px; }
  .modal-wrap { display:none; position:fixed; inset:0; background:rgba(30,10,0,.75); z-index:999; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .modal-wrap.open { display:flex; }
  .modal-inner { animation: popIn .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn { from{opacity:0;transform:scale(.88);} to{opacity:1;transform:scale(1);} }
  #mob-menu { max-height:0; overflow:hidden; transition:max-height .35s ease; }
  #mob-menu.open { max-height:360px; }
  .pill { transition: all .2s; }
  .pill.on  { background:#451A03; color:#F4A100; }
  .pill.off { background:#F5F0E8; color:#92400E; }
  @keyframes steam {
    0%  { opacity:.7; transform:translateY(0) scaleX(1); }
    50% { opacity:.4; transform:translateY(-8px) scaleX(1.15); }
    100%{ opacity:0;  transform:translateY(-18px) scaleX(.8); }
  }
  .steam span { display:inline-block; width:4px; border-radius:9px; background:rgba(255,200,100,.5); animation:steam 1.6s ease-in-out infinite; }
  .steam span:nth-child(2){ animation-delay:.3s; height:22px; }
  .steam span:nth-child(3){ animation-delay:.6s; }
  .hero-texture { background-color:#451A03; background-image: radial-gradient(ellipse at 20% 50%,rgba(244,161,0,.18) 0%,transparent 60%), radial-gradient(ellipse at 80% 20%,rgba(185,28,28,.15) 0%,transparent 50%); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  body { animation: fadeUp .5s ease; }
</style>
